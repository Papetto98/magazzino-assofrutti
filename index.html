<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magazzino Assofrutti</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans','Segoe UI',sans-serif;background:#0f1419;color:#e8e0d4}
    ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#1a2029}::-webkit-scrollbar-thumb{background:#3a4a5a;border-radius:4px}
    @media print{
      body{background:white!important;color:black!important}
      [data-no-print]{display:none!important}
      div{background:white!important;color:black!important;border-color:#ccc!important}
      table{border-collapse:collapse;width:100%}
      th{background:#f0f0f0!important;color:black!important;border:1px solid #ccc;padding:6px 8px;font-size:11px}
      td{border:1px solid #ccc;padding:4px 8px;font-size:11px;color:black!important}
      span{color:black!important;background:none!important}
      h2,h3{color:black!important}
      @page{margin:1cm;size:landscape}
    }
  </style>
</head>
<body><div id="root"></div><script type="module" src="/src/main.jsx"></script></body>
</html>
